<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="">
  <style type="text/css">
    #humanos{
    }
    #NPC_container{
      /*text-align: right;*/
    }
  </style>
</head>
<body>
  <input type="checkbox" value="🎲" id="toggle_all">
  <input type="button" value="🎲" id="regenerate">
  <div id="NPC_container" style="margin-bottom: 1em;">
    <div id="NPC">
      <h2>NPC</h2>
      <div class="genero">
        <input type="checkbox" class="genero">
        <label style="padding-left: 2.3em;">Gênero:</label>
        <select class="genero">
          <option value="female">Feminino</option>
          <option value="male">Masculino</option>
          <option value="neutral">Neutro</option>
        </select>
      </div>
      <div class="ancestralidade">
        <input type="checkbox" class="ancestralidade">
        <label style="padding-left: 2.3em;">Ancestralidade:</label>
        <select class="ancestralidade">
          <option value="anão" data-neutral="false">Anão</option>
          <option value="elfo">Elfo</option>
          <option value="gnomo">Gnomo</option>
          <option value="goblin" data-neutral="false">Goblin</option>
          <option value="halfling" data-neutral="false">Halfling</option>
          <option value="meio_elfo" data-neutral="false">Meio elfo</option>
          <option value="meio_orc">Meio orc</option>
          <optgroup label="Humano">
            <option value="humano" data-neutral="false">Etnia Aleatória</option>
            <option value="garundi" data-neutral="false">Garundi</option>
            <option value="keleshita" data-neutral="false">Keleshita</option>
            <option value="kellid" data-neutral="false">Kellid</option>
            <option value="nidalês" data-neutral="false">Nidalês</option>
            <option value="shoanti" data-neutral="false">Shoanti</option>
            <option value="taldano" data-neutral="false">Taldano</option>
            <option value="ulfeno" data-neutral="false">Ulfeno</option>
            <option value="varisiano" data-neutral="false">Varisiano</option>
            <option value="vudrani" data-neutral="false">Vudrani</option>
            <optgroup label="Mwangi" data-neutral="false">
              <option value="mwangi"data-neutral="false" class="humano">Cultura Aleatória</option>
              <option value="bekyar"data-neutral="false" class="humano">Bekyar</option>
              <option value="bonuwat_mauxi"data-neutral="false" class="humano">Bonuwat ou Mauxi</option>
              <option value="zenj"data-neutral="false" class="humano">Zenj</option>
            </optgroup>
            <optgroup label="Tianês">
              <option value="tianês">Cultura Aleatória</option>
              <option value="tian_dan" data-neutral="false">Tian Dan</option>
              <option value="tian_dtangs" data-neutral="false">Tian Dtangs</option>
              <option value="tian_hwan" data-neutral="false">Tian Hwan</option>
              <option value="tian_la" data-neutral="false">Tian La</option>
              <option value="tian_min">Tian Min</option>
              <option value="tian_shu">Tian Shu</option>
              <option value="tian_sing" data-neutral="false">Tian Sing</option>
            </optgroup>
          </optgroup>
        </select>
      </div>
      <div class="nome">
        <input type="checkbox" class="nome">
        <input type="button" value="🎲" onclick="generate_npc()">      
        <label>Nome:</label>
        <span></span>
        <!-- <select id="nome"></select> -->
      </div>
    </div>
    <div id="NPC_background">
      <h2>Biografia</h2>
      <div class="local_de_nascimento">
        <input type="checkbox" class="local_de_nascimento">
        <input type="button" value="🎲">
        <label>Nasceu:</label>
        <span></span>
      </div>
      <div class="pais">
        <input type="checkbox" class="pais">
        <input type="button" value="🎲">
        <label>Pais:</label>
        <span></span>
      </div>
      <div class="lar">
        <input type="checkbox" class="lar">
        <input type="button" value="🎲">
        <label>Lar e Estilo de Vida:</label>
        <span></span>
      </div>
      <div class="biografia">
        <input type="checkbox" class="biografia">
        <input type="button" value="🎲">
        <label>Biografia:</label>
        <span></span>
      </div>
    </div>
    <div id="NPC_appearance">
      <h2>Aparência</h2>
      <div class="corpo">
        <input type="checkbox" class="corpo">
        <input type="button" value="🎲">
        <label>Corpo:</label>
        <span></span>
      </div>
      <div class="altura">
        <input type="checkbox" class="altura">
        <input type="button" value="🎲">
        <label>Altura:</label>
        <span></span>
      </div>
      <div class="cabelo">
        <input type="checkbox" class="cabelo">
        <input type="button" value="🎲">
        <label>Cabelo:</label>
        <span></span>
      </div>
      <div class="" data-empty="true">
        <input type="checkbox" class="">
        <input type="button" value="🎲">
        <label></label>
        <span></span>
      </div>
      <div class="" data-empty="true">
        <input type="checkbox" class="">
        <input type="button" value="🎲">
        <label></label>
        <span></span>
      </div>
    </div>
    <div id="NPC_behavior">
      <h2>Comportamento</h2>
      <div class="humor">
        <input type="checkbox" class="humor">
        <input type="button" value="🎲">
        <label>Humor atual:</label>
        <span></span>
      </div>
      <div class="" data-empty="true">
        <input type="checkbox" class="">
        <input type="button" value="🎲">
        <label></label>
        <span></span>
      </div>
    </div>
  </div>
  <div class="descrição">
    <h2 class="descrição">Descrição</h2>
    <label>Nome Alternativo</label>
    <input type="text">
    <textarea name="" id="" cols="35" rows="10" style="display: block;"></textarea>
  </div>
  <script src="./geração/funções.js"></script>
  <script src="./geração/anão.js"></script>
  <script src="./geração/elfo.js"></script>
  <script src="./geração/gnomo.js"></script>
  <script src="./geração/goblin.js"></script>
  <script src="./geração/halfling.js"></script>
  <script src="./geração/humano.js"></script>
  <script src="./geração/meio_elfo.js"></script>
  <script src="./geração/meio_orc.js"></script>
  <script src="./geração/traços.js"></script>
  <script src="./geração/ancestralidades.js"></script>
  <script src="./gerador.js"></script>
</body>
</html>
